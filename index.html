<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Richiesta di Preghiera</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
      color: #333;
    }

    textarea {
      width: 100%;
      height: 100px;
      border-radius: 8px;
      border: 1px solid #ddd;
      padding: 10px;
      font-size: 14px;
      resize: none;
      outline: none;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #0070f3;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #005ad1;
    }

    .response {
      padding: 12px;
      background: #f0f4ff;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading {
      font-size: 16px;
      color: #666;
    }

    .reset-btn {
      margin-top: 15px;
      background: #eee;
      color: #333;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🙏 Richiesta di Preghiera</h2>

  <div id="box">
    <textarea id="input" placeholder="Scrivi la tua richiesta..."></textarea>
  </div>

  <button onclick="send()">Invia</button>
</div>

<!-- collega il tuo file JS -->
<script src="chat.js"></script>

</body>
</html>
