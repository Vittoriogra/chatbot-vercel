<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Richiesta di Preghiera</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
      color: #333;
    }

    textarea {
      width: 100%;
      height: 100px;
      border-radius: 8px;
      border: 1px solid #ddd;
      padding: 10px;
      font-size: 14px;
      resize: none;
      outline: none;
    }

    textarea:focus {
      border-color: #0070f3;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #0070f3;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #005ad1;
    }

    .response {
      margin-top: 20px;
      padding: 12px;
      background: #f0f4ff;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      min-height: 40px;
    }

    .loading {
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🙏 Richiesta di Preghiera</h2>

  <textarea id="input" placeholder="Scrivi la tua richiesta..."></textarea>

  <button onclick="send()">Invia</button>

  <div id="response" class="response"></div>
</div>

<script>
async function send() {
  const message = document.getElementById("input").value;
  const responseBox = document.getElementById("response");

  if (!message) {
    responseBox.innerText = "Scrivi qualcosa";
    return;
  }

  responseBox.innerHTML = "<span class='loading'>Sto pensando...</span>";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    responseBox.innerText = data.reply;

  } catch (err) {
    responseBox.innerText = "Errore, riprova.";
  }
}
</script>

</body>
</html>
